<form class="settings-form" style="font-family: 'Noto Sans', 'Segoe UI', sans-serif; font-weight: 500; height: 100%; display: flex; flex-direction: column;">
  <!-- Прокручиваемая область -->
  <div class="scrollable-content" style="overflow-y: auto; flex: 1; padding-right: 10px;">
    <p>{{localize "PF2E-TOKEN-PACK.SettingCompendiumsSettingsMessage"}}</p>

    <div class="form-group">
      <label>
        <input type="checkbox" id="toggle-check-buttons" />
        {{localize "PF2E-TOKEN-PACK.SettingCompendiumsEnableCheckMode"}}
      </label>
    </div>

    {{#each groups}}
      <h2>{{localize (concat "PF2E-TOKEN-PACK." @key)}}</h2>
      {{#each this}}
        <div class="form-group">
          <label for="{{settingKey}}">{{name}}</label>
          <input type="checkbox" name="{{settingKey}}" {{#if value}}checked{{/if}}>
          <button type="button" class="check-button" data-key="{{key}}" style="display: none;">
            {{localize "PF2E-TOKEN-PACK.SettingCompendiumsCheckButtonLabel"}}
          </button>
          {{#if hint}}<p class="hint">{{hint}}</p>{{/if}}
        </div>
      {{/each}}
    {{/each}}
  </div>

  <!-- Футер с кнопкой -->
  <div class="form-footer" style="
    flex-shrink: 0;
    padding: 10px 0 0;
    border-top: 1px solid var(--color-border-light-tertiary);
    background-color: var(--color-bg);
    box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.05);
    z-index: 1;
  ">
    <button type="submit" class="button">{{localize "PF2E-TOKEN-PACK.SettingCompendiumsSaveAndUpdate"}}</button>
  </div>
</form>
